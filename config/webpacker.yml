default: &default
  source_path: app/javascript
  source_entry_path: packs
  public_output_path: packs
  cache_manifest: true

  # Additional paths to include when compiling
  additional_paths: []

  # Reload manifest.json on all requests so we reload latest compiled packs
  cache_manifest: true

  # https://github.com/rails/webpacker#webpack-and-external-libraries
  static_assets_extensions:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .tiff
    - .bmp
    - .svg
    - .woff
    - .woff2
    - .ttf
    - .otf
    - .eot
    - .ico
    - .webp

development:
  <<: *default
  compile: true

  # References: https://webpack.js.org/configuration/dev-server/
  dev_server:
    https: false
    host: localhost
    port: 3035
    public: localhost:3035
    hmr: false
    # Inline should be set to true if you are using inline mode
    inline: true
    overlay: true
    compress: true
    disable_host_check: true
    use_local_ip: false
    quiet: false
    pretty: false
    client_log_level: 'warning'
    content_base: public
    public_path: packs
    config: webpack.config.js

test:
  <<: *default
  compile: true

  # Compile test packs to a separate directory
  public_output_path: packs-test

production:
  <<: *default

  # Production depends on precompilation of packs prior to booting for performance.
  compile: false

  # Cache manifest.json for performance
  cache_manifest: true